<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="https://sivanesh.me/assets/icon-B1_eCjej.png" />
  <title>404 - Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7b2ff7;
      --text: #111;
      --muted: #888;
      --border: #ebebeb;
      --bg: #fafafa;
      --line-h: #f4f0ff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 460px;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Logo ── */
    .logo {
      width: 120px; height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid rgba(123,47,247,0.12);
      margin-bottom: 1.1rem;
      position: relative;
      box-shadow:
        0 0 0 5px rgba(123,47,247,0.04),
        0 4px 14px rgba(123,47,247,0.08);
      animation: logoPulse 3s ease-in-out infinite;
    }

    .logo img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Shimmer sweep */
    .logo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 20%,
        rgba(255,255,255,0.55) 50%,
        transparent 80%
      );
      transform: translateX(-100%);
      animation: shimmer 3.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-130%); }
      50%  { transform: translateX(130%); }
      100% { transform: translateX(130%); }
    }

    @keyframes logoPulse {
      0%, 100% {
        box-shadow:
          0 0 0 5px rgba(123,47,247,0.04),
          0 4px 14px rgba(123,47,247,0.08);
      }
      50% {
        box-shadow:
          0 0 0 8px rgba(123,47,247,0.06),
          0 6px 20px rgba(123,47,247,0.13);
      }
    }

    /* ── Subtitle only — no big 404 ── */
    .subtitle {
      font-size: 0.88rem;
      color: #bbb;
      font-weight: 400;
      margin-bottom: 1.5rem;
      letter-spacing: 0.2px;
    }

    /* ── Terminal ── */
    .terminal {
      width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(0,0,0,0.05);
      margin-bottom: 1.5rem;
    }

    .t-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: #f7f7f7;
      border-bottom: 1px solid var(--border);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #ffbd2e; }
    .dot.g { background: #28c840; }
    .t-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem;
      color: #c0c0c0;
      margin-left: auto;
    }

    .t-body {
      padding: 1rem 1.2rem 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 188px;
    }

    .log {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.8;
      display: flex;
      align-items: baseline;
      gap: 10px;
      border-radius: 5px;
      padding: 1px 6px;
      margin: 0 -6px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.45s cubic-bezier(0.22,1,0.36,1),
                  transform 0.45s cubic-bezier(0.22,1,0.36,1),
                  background 0.3s ease;
    }
    .log.visible { opacity: 1; transform: translateY(0); }
    .log.active  { background: var(--line-h); }
    .log.done    { background: transparent; }

    .icon { flex-shrink: 0; font-size: 0.78rem; }
    .body      { color: #555; }
    .body .hi  { color: #7b2ff7; font-weight: 500; }
    .body .bad { color: #dc2626; font-weight: 500; }
    .body .ok  { color: #16a34a; font-weight: 500; }
    .body .dim { color: #c0c0c0; }

    .cursor {
      display: inline-block;
      width: 6px; height: 0.8em;
      background: var(--accent);
      vertical-align: middle;
      border-radius: 1px;
      margin-left: 3px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1),
                  transform 0.5s cubic-bezier(0.22,1,0.36,1);
      margin-bottom: 1.25rem;
    }
    .actions.show { opacity: 1; transform: translateY(0); }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.35rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.86rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: 1.5px solid var(--accent);
    }
    .btn-primary:hover { background: #6a1fe0; border-color: #6a1fe0; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { border-color: #ccc; color: var(--text); transform: translateY(-1px); }

    /* ── 404 below buttons ── */
    .error-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: #d0d0d0;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.5s ease 0.2s;
    }
    .error-tag.show { opacity: 1; }

    @media (max-width: 480px) {
      .logo { width: 96px; height: 96px; border-radius: 50%; }
      .log { font-size: 0.7rem; }
      .t-body { padding: 0.85rem 0.9rem; min-height: 170px; }
    }
  </style>
</head>
<body>

  <div class="wrap">

    <div class="logo">
      <img src="https://sivanesh.me/assets/icon-B1_eCjej.png" alt="Sivanesh" />
    </div>

    <p class="subtitle">Page not found</p>

    <div class="terminal">
      <div class="t-bar">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
        <span class="t-title">page-finder.sh</span>
      </div>
      <div class="t-body" id="logBox"></div>
    </div>

    <div class="actions" id="actions">
      <a href="https://sivanesh.me" class="btn btn-primary">← Back to Home</a>
      <a href="javascript:history.back()" class="btn btn-ghost">Go Back</a>
    </div>

    <span class="error-tag" id="errorTag">Error 404</span>

  </div>

  <script>
    function getLines() {
      const path = window.location.pathname || '/this-page';
      return [
        { icon: '🔍', html: `Looking for <span class="hi">${path}</span>...` },
        { icon: '📂', html: `Checking main pages&hellip; <span class="dim">not here</span>` },
        { icon: '📂', html: `Checking older pages&hellip; <span class="dim">not here either</span>` },
        { icon: '🔗', html: `Trying alternate links&hellip; <span class="dim">still nothing</span>` },
        { icon: '❌', html: `This page <span class="bad">doesn't exist</span> — it may have moved or been deleted` },
        { icon: '💡', html: `<span class="ok">Tip:</span> Go back home and navigate from there<span class="cursor"></span>` },
      ];
    }

    const box      = document.getElementById('logBox');
    const actions  = document.getElementById('actions');
    const errorTag = document.getElementById('errorTag');
    const delays   = [300, 600, 550, 580, 520, 560];

    async function run() {
      const lines = getLines();
      for (let i = 0; i < lines.length; i++) {
        await new Promise(r => setTimeout(r, delays[i]));

        if (i > 0) {
          const prev = box.children[i - 1];
          prev.classList.remove('active');
          prev.classList.add('done');
        }

        const row = document.createElement('div');
        row.className = 'log';
        row.innerHTML = `<span class="icon">${lines[i].icon}</span><span class="body">${lines[i].html}</span>`;
        box.appendChild(row);

        requestAnimationFrame(() => requestAnimationFrame(() => {
          row.classList.add('visible', 'active');
        }));
      }

      await new Promise(r => setTimeout(r, 550));
      actions.classList.add('show');
      errorTag.classList.add('show');
    }

    run();
  </script>

</body>
</html>
